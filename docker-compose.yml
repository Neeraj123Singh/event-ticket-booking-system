# Local PostgreSQL for the ticketing platform. From repo root:
#   docker compose up -d
# Host port 5433 avoids clashing with a local Postgres on 5432. Inside the container it stays 5432.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
      POSTGRES_DB: ticketing
    ports:
      - "5433:5432"
    volumes:
      - ticketing_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing -d ticketing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ticketing_pg:
